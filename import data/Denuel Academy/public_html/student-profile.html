<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="student-profile" class="dashboard-page module-page">
  <div class="dashboard-layout">
    <aside class="academy-sidebar" aria-label="Sidebar navigation">
      <div class="academy-brand sidebar-brand">
        <span class="club-badge">GTPro</span>
        <div>
          <h1>GTPro</h1>
          <p>Manager</p>
        </div>
      </div>
      <nav class="sidebar-nav" aria-label="Main navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="plans.html">Plans</a>
        <a href="classes.html">Classes</a>
        <a href="class-schedule.html">Class Schedule</a>
        <a class="active" href="students.html">Students</a>
        <a href="attendance.html">Attendance</a>
        <a href="renewals.html">Renewals</a>
        <div class="sidebar-group">
          <button type="button" class="sidebar-group-title" aria-expanded="false">
            <span>Sales</span>
            <span class="sidebar-caret">+</span>
          </button>
          <div class="sidebar-submenu">
            <a href="payments.html?tab=invoices">Invoices</a>
            <a href="payments.html?tab=pending">Pending Payment</a>
            <a href="payments.html?tab=received">Received Payment</a>
          </div>
        </div>
        <a href="expenses.html">Expenses</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
      </nav>
      <a class="logout-link sidebar-logout" href="#" onclick="logout()">Logout</a>
    </aside>

    <div class="dashboard-main">
      <header class="academy-header module-header">
        <div class="academy-brand">
          <span class="club-badge">GTPro</span>
          <div>
            <h1 id="studentProfileTitle">Student Profile</h1>
            <p id="studentProfileSubtitle">Overview and history</p>
          </div>
        </div>
      </header>

      <main class="dashboard-shell">
        <section class="module-card">
          <div id="msg" class="msg"></div>

          <div class="student-tabs" role="tablist" aria-label="Student sections">
            <button type="button" role="tab" aria-selected="true" class="student-tab active" data-tab="overview" onclick="setStudentProfileTab('overview')">Overview</button>
            <button type="button" role="tab" aria-selected="false" class="student-tab" data-tab="item" onclick="setStudentProfileTab('item')">Item</button>
            <button type="button" role="tab" aria-selected="false" class="student-tab" data-tab="plan" onclick="setStudentProfileTab('plan')">Abonnement</button>
            <button type="button" role="tab" aria-selected="false" class="student-tab" data-tab="pending" onclick="setStudentProfileTab('pending')">Pending</button>
            <button type="button" role="tab" aria-selected="false" class="student-tab" data-tab="paid" onclick="setStudentProfileTab('paid')">Paid</button>
            <button type="button" role="tab" aria-selected="false" class="student-tab" data-tab="attendance" onclick="setStudentProfileTab('attendance')">Attendance</button>
            <button type="button" role="tab" aria-selected="false" class="student-tab" data-tab="performance" onclick="setStudentProfileTab('performance')">Performance</button>
          </div>

          <div id="studentProfileContent">
            <div class="student-panel" data-panel="overview"></div>
            <div class="student-panel hidden" data-panel="item"></div>
            <div class="student-panel hidden" data-panel="plan"></div>
            <div class="student-panel hidden" data-panel="pending"></div>
            <div class="student-panel hidden" data-panel="paid"></div>
            <div class="student-panel hidden" data-panel="attendance"></div>
            <div class="student-panel hidden" data-panel="performance"></div>
          </div>

          <div id="studentPendingPaymentModal" class="plan-form-modal hidden" aria-hidden="true" onclick="dismissStudentProfilePendingPaymentModal(event)">
            <div class="plan-form-dialog payment-modal-dialog">
              <div class="plan-form-header">
                <div>
                  <h3>Make Payment</h3>
                  <p class="payment-modal-hint">Record payment details for this pending item.</p>
                </div>
                <button type="button" class="plan-form-close" onclick="closeStudentProfilePendingPaymentModal()" aria-label="Close">&times;</button>
              </div>
              <div class="plan-form-body">
                <input id="studentPendingPaymentStudentId" type="hidden">
                <input id="studentPendingPaymentItem" type="hidden">
                <input id="studentPendingPaymentPeriodStart" type="hidden">
                <input id="studentPendingPaymentPeriodEnd" type="hidden">
                <div class="exp-form-grid">
                  <div class="plan-form-group">
                    <label class="plan-label" for="studentPendingPaymentStudentName">Student</label>
                    <input id="studentPendingPaymentStudentName" class="plan-input" type="text" readonly>
                  </div>
                  <div class="plan-form-group">
                    <label class="plan-label" for="studentPendingPaymentAmount">Amount *</label>
                    <input id="studentPendingPaymentAmount" class="plan-input" type="number" min="0" step="0.01" placeholder="0.00">
                  </div>
                </div>
                <div class="exp-form-grid">
                  <div class="plan-form-group">
                    <label class="plan-label" for="studentPendingPaymentMode">Mode of Payment</label>
                    <select id="studentPendingPaymentMode" class="plan-input">
                      <option value="cash">Cash</option>
                      <option value="cheque">Cheque</option>
                      <option value="other">Other</option>
                      <option value="card">Card</option>
                      <option value="bank_transfer">Bank Transfer</option>
                      <option value="online">Online</option>
                    </select>
                  </div>
                  <div class="plan-form-group">
                    <label class="plan-label" for="studentPendingPaymentDate">Date</label>
                    <input id="studentPendingPaymentDate" class="plan-input" type="datetime-local">
                  </div>
                </div>
                <div class="plan-form-group">
                  <label class="plan-label" for="studentPendingPaymentNote">Note (optional)</label>
                  <textarea id="studentPendingPaymentNote" class="plan-input" rows="3" maxlength="500" placeholder="Internal note"></textarea>
                </div>
              </div>
              <div class="plan-form-footer">
                <button type="button" class="plan-action-btn" onclick="submitStudentProfilePendingPaymentModal()">Save Payment</button>
                <button type="button" class="plan-action-btn danger" onclick="closeStudentProfilePendingPaymentModal()">Cancel</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
</body>
</html>
